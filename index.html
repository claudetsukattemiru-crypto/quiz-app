<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一般常識クイズ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>一般常識クイズ</h1>
    </header>

    <section id="start-screen" class="screen">
      <p>全<span id="question-count"></span>問の一般常識クイズに挑戦しよう!</p>
      <button id="start-btn" class="btn">スタート</button>
    </section>

    <section id="quiz-screen" class="screen hidden">
      <div class="progress">
        <span id="progress-text"></span>
        <div class="progress-bar"><div id="progress-fill"></div></div>
      </div>
      <h2 id="question-text"></h2>
      <div id="choices" class="choices"></div>
      <p id="feedback" class="feedback hidden"></p>
      <button id="next-btn" class="btn hidden">次へ</button>
    </section>

    <section id="result-screen" class="screen hidden">
      <h2>結果発表</h2>
      <p id="score-text"></p>
      <button id="retry-btn" class="btn">もう一度挑戦</button>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
